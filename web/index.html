<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Temporal Millet</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.0/css/bulma.min.css">
  <script src="web.bc.js"></script>
  <style>
    .aside {
      position: sticky;
      /* Safari */
      position: -webkit-sticky;
      top: 0;
      height: 100%;
    }

    .panel-block {
      display: block
    }

    pre.syn-ml {
      background: #f6f8fa;
      color: #24292e;
      font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
      font-size: 0.9rem;
      padding: 0.75rem 1rem;
    }

    pre.syn-ml .syn-kw {
      color: #a626a4;
      font-weight: 600;
    }

    pre.syn-ml .syn-ctor {
      color: #c18401;
    }

    pre.syn-ml .syn-str {
      color: #50a14f;
    }

    pre.syn-ml .syn-num {
      color: #986801;
    }

    pre.syn-ml .syn-resource {
      color: #0366d6;
      font-weight: 600;
    }

    pre.syn-ml .active-redex {
      background-color: #fff3bf;
      color: inherit;
      font-weight: 600;
      padding: 0 2px;
      border-radius: 2px;
      box-shadow: 0 0 0 1px #f0b500;
      /* Make the background repeat on every visual line when the span wraps
         across newlines (which is common inside <pre>). */
      -webkit-box-decoration-break: clone;
      box-decoration-break: clone;
    }
  </style>
</head>

<body>
  <section class="section">
    <div class="container" id="container">
    </div>
  </section>
</body>

</html>
